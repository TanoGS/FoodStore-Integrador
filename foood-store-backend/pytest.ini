[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -ra --strict-markers --cov=app --cov-report=term-missing --cov-fail-under=60
asyncio_mode = auto
markers =
    unit: Tests unitarios (sin HTTP, sin BD).
    integration: Tests de integración (HTTP, BD, stack completo).
    slow: Tests que tardan más de 1 segundo.
env_files =
    .env.test
