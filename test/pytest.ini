# =============================================================================
# pytest.ini — Configuración de pytest
# =============================================================================
# Define opciones por defecto y el modo "strict" para evitar warnings
# disfrazados de passes (ver https://docs.pytest.org/en/stable/reference/reference.html#confval-strict_markers).
# =============================================================================

[pytest]
# ─── Paths ───────────────────────────────────────────────────────────────────
# Directorio raíz donde pytest busca los tests.
# Usar "" (vacío) para buscar desde la raíz del proyecto.
testpaths = tests
# Patrón de archivos que pytest considera tests.
python_files = test_*.py
# Patrón de clases que pytest considera tests.
python_classes = Test*
# Patrón de funciones/métodos que pytest considera tests.
python_functions = test_*

# ─── Salida ─────────────────────────────────────────────────────────────────
# -v: modo verbose (muestra cada test individualmente).
# --tb=short: tracebacks cortos (más legibles, menos spammy en CI).
# -ra: muestra resumen de skips, xfails, etc.
addopts = -v --tb=short -ra --strict-markers

# ─── Asyncio ─────────────────────────────────────────────────────────────────
# Configuración de pytest-asyncio (modo "auto" aplica @pytest.mark.asyncio
# automáticamente a todos los tests async).
asyncio_mode = auto

# ─── Markers personalizados ──────────────────────────────────────────────────
# Los markers deben declararse explícitamente cuando se usa --strict-markers.
markers =
    unit: Tests unitarios (sin HTTP, sin BD, lógica pura).
    integration: Tests de integración (HTTP, BD, stack completo).
    slow: Tests que tardan más de 1 segundo (marcados para poder excluirlos).

# ─── Variables de entorno para tests ─────────────────────────────────────────
# pytest carga automáticamente un archivo con este nombre si existe.
# Ver tests/conftest.py para ver cómo se selecciona .env vs .env.test.
env_files =
    .env.test

# ─── Cobertura (si se instala pytest-cov) ────────────────────────────────────
# Descomentar si se instala pytest-cov:
# addopts = -v --tb=short -ra --strict-markers --cov=app --cov-report=term-missing
